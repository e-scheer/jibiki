name: jibiki
description: "jibiki - a dictionary-first Japanese memorization tool (Flutter, MVVM)."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  # State management - MVVM: Views observe ChangeNotifier ViewModels via Provider.
  provider: ^6.1.2
  # Declarative routing with an auth/onboarding redirect guard.
  go_router: ^14.6.2
  # HTTP client for the jibiki API (adds the X-Session-Token header via an interceptor).
  dio: ^5.7.0
  # Local persistence of the allauth session token + cached profile.
  # (flutter_secure_storage is the recommended prod upgrade for the token - see README.)
  shared_preferences: ^2.3.3
  # Pick a mnemonic image from the gallery/camera (bytes → uploaded, web-safe).
  image_picker: ^1.1.2
  # Disk + memory cache for community images (feed, deck covers, tiles) so they
  # aren't re-downloaded/re-decoded on every scroll or revisit.
  cached_network_image: ^3.4.1
  # Parse KanjiVG SVG path `d` strings into ui.Path for stroke-order animation.
  path_drawing: ^1.0.1
  # On-device Japanese text-to-speech for the learn carousel + card audio.
  flutter_tts: ^4.2.0
  cupertino_icons: ^1.0.8
  # Native launch screen: also used at runtime (preserve/remove) to hold the OS
  # splash through bootstrap, so there's no flash to a second splash.
  flutter_native_splash: ^2.4.3
  sqlite3: <3.0.0
  sqlite3_flutter_libs: <0.6.0
  path_provider: ^2.1.6
  connectivity_plus: ^7.2.0
  uuid: ^4.5.3
  crypto: ^3.0.7
  language_code: ^0.7.1
  # Keep the FlutterFire release train internally compatible.
  firebase_core: 4.11.0
  firebase_analytics: 12.4.3
  firebase_performance: 0.11.4+3
  firebase_crashlytics: 5.2.4
  sentry_flutter: 9.14.0
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Generate launcher icons (Android adaptive + monochrome, iOS, web).
  flutter_launcher_icons: ^0.14.1

# Exploration 17 app icon: ink 字 on the full NeoPop acid field.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#F2E51C"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  adaptive_icon_monochrome: "assets/icon/icon_monochrome.png"
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#F2E51C"
    theme_color: "#2B36E3"

# Exploration 17 runtime splash. The OS launch stays a solid brand field so
# device-specific scaling never distorts the lockup; Flutter takes over with
# the animated branded splash while bootstrapping.
flutter_native_splash:
  color: "#2B36E3"
  color_dark: "#17131F"
  android_12:
    color: "#2B36E3"
    color_dark: "#17131F"
  android: true
  ios: false

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/data/kana_strokes.json
    # Bundled offline dictionary (the "base" content pack, installed on first
    # run). Regenerated at release time: make build-base-pack.
    - assets/packs/base.db.gz
    - assets/packs/base_manifest.json
  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf
    - family: ZenKakuGothicNew
      fonts:
        - asset: assets/fonts/ZenKakuGothicNew-Bold.ttf
          weight: 700
        - asset: assets/fonts/ZenKakuGothicNew-Black.ttf
          weight: 900
    # Japanese faces for study cards: the same character in different hands
    # (gothic · mincho · brush) so the eye learns to read its variants. OFL.
    - family: NotoSansJP
      fonts:
        - asset: assets/fonts/NotoSansJP.ttf
    - family: NotoSerifJP
      fonts:
        - asset: assets/fonts/NotoSerifJP.ttf
    - family: YujiSyuku
      fonts:
        - asset: assets/fonts/YujiSyuku.ttf
