<!DOCTYPE html><html><head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="jibiki, dictionnaire japonais libre et mémoire durable.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="jibiki">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>jibiki</title>
  <link rel="manifest" href="manifest.json">
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <style id="splash-screen-style">
    html { height: 100% }
    body { margin: 0; min-height: 100%; background-color: #2B36E3; background-size: 100% 100%; overflow: hidden; }
    #splash { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; pointer-events: none; }
    .splash-center { flex: 1; display: flex; align-items: center; justify-content: center; padding-bottom: 24px; }
    .splash-lockup { display: block; width: 256px; height: 256px; object-fit: contain; }
    .splash-foot { display: flex; flex-direction: column; align-items: center; gap: 22px; padding: 0 24px 44px; }
    .splash-baseline { display: block; width: 256px; height: 28px; object-fit: contain; }
    .chase { position: relative; width: 56px; height: 56px; }
    .chase i { position: absolute; top: 0; left: 0; width: 19px; height: 19px; background: #F2E51C; border: 2.5px solid #17131F; border-radius: 6px; box-shadow: 3px 3px 0 #17131F; animation: chase 640ms steps(1, end) infinite; }
    .chase i:nth-child(2) { background: #FF57A8; animation-delay: -160ms; }
    .chase i:nth-child(3) { background: #8FE838; animation-delay: -320ms; }
    @keyframes chase { 0% { translate: 0 0; } 25% { translate: 32px 0; } 50% { translate: 32px 32px; } 75% { translate: 0 32px; } 100% { translate: 0 0; } }
    @media (prefers-color-scheme: dark) { body { background-color: #17131F; } }
    @media (prefers-reduced-motion: reduce) { .chase i { animation: none; } .chase i:nth-child(2) { translate: 32px 0; } .chase i:nth-child(3) { translate: 32px 32px; } }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
      document.body.style.overflow = "visible";
    }
  </script>
</head><body>
  <div id="splash" role="status" aria-label="Chargement de jibiki">
    <div class="splash-center"><picture>
      <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
      <img class="splash-lockup" aria-hidden="true" src="splash/img/light-1x.png" alt="">
    </picture></div>
    <div class="splash-foot"><span class="chase" aria-hidden="true"><i></i><i></i><i></i></span><picture>
      <source srcset="splash/img/branding-1x.png 1x, splash/img/branding-2x.png 2x, splash/img/branding-3x.png 3x, splash/img/branding-4x.png 4x" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/branding-dark-1x.png 1x, splash/img/branding-dark-2x.png 2x, splash/img/branding-dark-3x.png 3x, splash/img/branding-dark-4x.png 4x" media="(prefers-color-scheme: dark)">
      <img class="splash-baseline" aria-hidden="true" src="splash/img/branding-1x.png" alt="">
    </picture></div>
  </div>
  <script src="flutter_bootstrap.js" async=""></script>
</body></html>
