<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>jibiki — exploration 03 · Néon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --night-0: #07041a;
    --night-1: #0d0724;
    --night-2: #150a33;
    --panel: #17103a;
    --line: rgba(150, 130, 255, .22);
    --ink: #f1edff;
    --ink-soft: #cfc8ec;
    --ink-mute: #b3abd6;
    --cyan: #4ce3ff;       /* navigation, actions */
    --magenta: #ff4fd8;    /* étude, SRS */
    --sodium: #ffd84d;     /* communauté */
    --rose: #ff5470;       /* note : Encore */
    --orange: #ffb03a;     /* note : Difficile */
    --vert: #5dff9d;       /* note : Bien */
    --jp: 'Zen Kaku Gothic New', 'Noto Sans JP', 'Noto Sans CJK JP', sans-serif;
    --lat: 'Outfit', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--lat);
    color: var(--ink);
    min-height: 100vh;
    background:
      radial-gradient(1100px 640px at 12% -8%, rgba(84, 40, 160, .50), transparent 62%),
      radial-gradient(900px 520px at 88% 2%, rgba(0, 170, 255, .17), transparent 60%),
      radial-gradient(1300px 720px at 50% 108%, rgba(255, 60, 190, .18), transparent 66%),
      linear-gradient(180deg, var(--night-0) 0%, var(--night-1) 52%, var(--night-2) 100%);
    background-color: var(--night-1);
    overflow-x: hidden;
  }

  /* ---------- toile de fond : skyline ---------- */
  .stage { position: relative; }
  .skyline {
    position: absolute;
    inset: auto 0 0 0;
    width: 100%;
    height: 300px;
    display: block;
    z-index: 0;
    pointer-events: none;
  }
  .content { position: relative; z-index: 1; padding: 52px 40px 96px; }

  /* ---------- en-tête de la direction ---------- */
  .direction { text-align: center; margin-bottom: 44px; }
  .direction h1 {
    font-family: var(--lat);
    font-weight: 800;
    font-size: 64px;
    letter-spacing: .01em;
    color: #f4fdff;
    text-shadow:
      0 0 6px rgba(120, 235, 255, .95),
      0 0 20px rgba(76, 227, 255, .70),
      0 0 52px rgba(76, 227, 255, .45),
      0 0 110px rgba(255, 79, 216, .40);
    animation: flicker 9s linear infinite;
  }
  .direction h1 .kana-mark {
    font-family: var(--jp);
    font-weight: 700;
    font-size: 26px;
    vertical-align: 18px;
    margin-left: 14px;
    color: #ffd9f4;
    text-shadow: 0 0 8px rgba(255, 79, 216, .9), 0 0 26px rgba(255, 79, 216, .55);
  }
  .direction p {
    margin-top: 12px;
    font-size: 17px;
    color: var(--ink-soft);
    text-wrap: balance;
  }
  .direction p b { color: var(--cyan); font-weight: 600; }
  .direction p .role-m { color: var(--magenta); font-weight: 600; }
  .direction p .role-s { color: var(--sodium); font-weight: 600; }

  /* ---------- galerie ---------- */
  .gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 56px 44px;
  }
  .phone { width: 390px; }
  .phone > figcaption {
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
    font-size: 15px;
    font-weight: 600;
    color: var(--ink-soft);
    margin-bottom: 14px;
  }
  .phone > figcaption .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--cap-color, var(--cyan));
    box-shadow: 0 0 8px var(--cap-color, var(--cyan));
  }

  .screen {
    position: relative;
    width: 390px;
    height: 840px;
    border-radius: 48px;
    border: 1px solid rgba(160, 140, 255, .30);
    background:
      radial-gradient(420px 300px at 80% -6%, rgba(0, 170, 255, .13), transparent 60%),
      radial-gradient(460px 340px at 8% 104%, rgba(255, 60, 190, .12), transparent 62%),
      linear-gradient(180deg, #100a2c 0%, #0c0722 60%, #120a30 100%);
    box-shadow:
      0 30px 80px rgba(2, 0, 14, .8),
      0 0 0 6px rgba(8, 4, 26, .9),
      0 0 44px rgba(90, 60, 200, .22);
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    scrollbar-width: none;
  }
  .screen::-webkit-scrollbar { display: none; }

  /* barre de statut */
  .statusbar {
    flex: 0 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 30px 2px;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink-soft);
  }
  .statusbar svg { display: block; opacity: .85; }

  .pad { padding: 0 22px; }

  /* ---------- composants communs ---------- */
  .topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 22px 8px;
  }
  .topbar .title { font-size: 16px; font-weight: 600; color: var(--ink-soft); }
  .icon-btn {
    width: 44px; height: 44px;
    display: grid; place-items: center;
    border-radius: 14px;
    border: 1px solid var(--line);
    background: rgba(24, 16, 52, .6);
    color: var(--cyan);
  }
  .icon-btn svg { display: block; }

  .section-label {
    font-size: 13.5px;
    font-weight: 600;
    color: var(--ink-mute);
    margin-bottom: 6px;
  }
  .section-label .tick-y { color: var(--sodium); }
  .section-label .tick-c { color: var(--cyan); }

  /* ================================================================
     ÉCRAN 1 — ACCUEIL
     ================================================================ */
  .brand-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 22px 18px;
  }
  .brand-mark {
    width: 46px; height: 46px;
    border-radius: 14px;
    display: grid; place-items: center;
    font-family: var(--jp);
    font-weight: 900;
    font-size: 24px;
    color: #eafbff;
    border: 2px solid rgba(76, 227, 255, .65);
    background: rgba(10, 30, 48, .5);
    text-shadow: 0 0 8px rgba(76, 227, 255, .9), 0 0 22px rgba(76, 227, 255, .5);
    box-shadow: 0 0 14px rgba(76, 227, 255, .30), inset 0 0 12px rgba(76, 227, 255, .14);
  }
  .brand-name { font-size: 21px; font-weight: 700; letter-spacing: .02em; }
  .brand-sub { font-size: 13px; color: var(--ink-mute); }

  .search {
    display: flex;
    align-items: center;
    gap: 12px;
    height: 54px;
    padding: 0 18px;
    border-radius: 18px;
    border: 1.5px solid rgba(76, 227, 255, .45);
    background: rgba(12, 20, 44, .72);
    box-shadow: 0 0 16px rgba(76, 227, 255, .16), inset 0 0 14px rgba(76, 227, 255, .06);
    color: var(--cyan);
  }
  .search .ph { font-size: 15.5px; color: #b9b1da; }

  .review-block {
    margin-top: 20px;
    border-radius: 22px;
    border: 1.5px solid rgba(255, 79, 216, .48);
    background:
      radial-gradient(300px 160px at 88% -20%, rgba(255, 79, 216, .16), transparent 65%),
      rgba(26, 12, 46, .72);
    box-shadow: 0 0 22px rgba(255, 79, 216, .16), inset 0 0 20px rgba(255, 79, 216, .06);
    padding: 18px 18px 16px;
  }
  .review-block h2 {
    font-size: 14px;
    font-weight: 600;
    color: #ffb7ec;
    margin-bottom: 6px;
  }
  .review-line { font-size: 21px; font-weight: 500; color: var(--ink); }
  .review-line b.due { font-weight: 800; color: var(--magenta); text-shadow: 0 0 14px rgba(255, 79, 216, .55); }
  .review-line b.new { font-weight: 800; color: var(--cyan); text-shadow: 0 0 14px rgba(76, 227, 255, .5); }
  .review-line .sep { color: var(--ink-mute); }
  .review-hint { margin-top: 4px; font-size: 13.5px; color: var(--ink-mute); }

  .cta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    height: 54px;
    margin-top: 14px;
    border: none;
    border-radius: 16px;
    font-family: var(--lat);
    font-size: 16.5px;
    font-weight: 700;
    letter-spacing: .01em;
    color: #33041f;
    background: linear-gradient(180deg, #ff74e2, #ff3fd2);
    box-shadow: 0 0 22px rgba(255, 79, 216, .45), 0 6px 18px rgba(255, 79, 216, .25);
    cursor: pointer;
    animation: breathe 3.6s ease-in-out infinite;
  }
  .cta svg { display: block; }

  .wotd {
    margin-top: 18px;
    border-radius: 22px;
    border: 1px solid var(--line);
    background: rgba(22, 14, 50, .6);
    padding: 16px 18px 18px;
  }
  .wotd-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .wotd-head .label {
    font-size: 14px;
    font-weight: 600;
    color: var(--sodium);
    text-shadow: 0 0 12px rgba(255, 216, 77, .45);
  }
  .wotd-head .date { font-size: 13px; color: var(--ink-mute); }
  .wotd-body { display: flex; align-items: center; gap: 18px; }
  .wotd-word { flex: 0 0 auto; text-align: center; }
  .wotd-word .furi {
    font-family: var(--jp);
    font-size: 13px;
    font-weight: 700;
    color: #ffe9a8;
    letter-spacing: .3em;
    margin-left: .3em;
  }
  .wotd-word .kanji {
    font-family: var(--jp);
    font-weight: 900;
    font-size: 54px;
    line-height: 1.15;
    color: #fffbe9;
    text-shadow:
      0 0 8px rgba(255, 216, 77, .85),
      0 0 24px rgba(255, 190, 60, .5),
      0 0 54px rgba(255, 150, 40, .3);
  }
  .wotd-info .romaji { font-size: 16px; font-weight: 600; color: var(--ink); }
  .wotd-info .gloss { margin-top: 3px; font-size: 14.5px; line-height: 1.45; color: var(--ink-soft); }
  .wotd-info .link {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 8px;
    font-size: 14px;
    font-weight: 600;
    color: var(--cyan);
  }
  /* zone de toucher étendue à 44px sans changer le visuel */
  .wotd-info .link::after, .vote::after { content: ""; position: absolute; inset: -13px -8px; }

  /* ruelle décorative qui remplit le bas de l'accueil */
  .street {
    flex: 1 1 auto;
    min-height: 0;
    position: relative;
    margin-top: 10px;
    overflow: hidden;
  }
  .street svg {
    position: absolute;
    inset: auto 0 -6px 0;
    width: 100%;
    display: block;
  }

  .nav {
    flex: 0 0 auto;
    position: sticky;
    bottom: 0;
    margin: 0 16px 18px;
    display: flex;
    justify-content: space-between;
    padding: 8px 10px;
    border-radius: 24px;
    border: 1px solid rgba(120, 220, 255, .28);
    background: rgba(16, 12, 40, .62);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 -8px 30px rgba(4, 2, 16, .6), 0 0 20px rgba(76, 227, 255, .10);
  }
  .nav a {
    flex: 1;
    min-height: 52px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    text-decoration: none;
    border-radius: 16px;
    font-size: 11.5px;
    font-weight: 600;
    color: #b8b1d8;
  }
  .nav a svg, .nav a .glyph { display: block; }
  .nav a .glyph { font-family: var(--jp); font-weight: 700; font-size: 19px; line-height: 22px; }
  .nav a.active {
    color: #dff8ff;
    background: rgba(76, 227, 255, .10);
    text-shadow: 0 0 10px rgba(76, 227, 255, .8);
  }
  .nav a.active svg { filter: drop-shadow(0 0 6px rgba(76, 227, 255, .9)); }

  /* ================================================================
     ÉCRAN 2 — FICHE MOT
     ================================================================ */
  .vitrine {
    position: relative;
    border-radius: 24px;
    border: 2px solid rgba(255, 110, 220, .55);
    background:
      radial-gradient(300px 190px at 50% 118%, rgba(255, 79, 216, .18), transparent 62%),
      linear-gradient(180deg, #1c0e38, #140829);
    box-shadow:
      0 0 18px rgba(255, 79, 216, .30),
      0 0 60px rgba(255, 79, 216, .14),
      inset 0 0 26px rgba(255, 79, 216, .10);
    padding: 12px 16px 10px;
    text-align: center;
  }
  .vitrine .furi {
    font-family: var(--jp);
    font-size: 14px;
    font-weight: 700;
    color: #ffd0f1;
    letter-spacing: .55em;
    margin-left: .55em;
  }
  .vitrine .hero {
    font-family: var(--jp);
    font-weight: 900;
    font-size: 78px;
    line-height: 1.02;
    color: #fff2fb;
    text-shadow:
      0 0 6px rgba(255, 130, 225, .95),
      0 0 20px rgba(255, 79, 216, .75),
      0 0 48px rgba(255, 79, 216, .45),
      0 0 100px rgba(255, 79, 216, .30);
    animation: flicker 8s linear infinite;
  }
  .vitrine .romaji-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .vitrine .romaji { font-size: 17px; font-weight: 600; letter-spacing: .12em; color: var(--ink); }
  .audio-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    display: grid; place-items: center;
    border: 1.5px solid rgba(76, 227, 255, .65);
    background: rgba(8, 26, 42, .6);
    color: var(--cyan);
    box-shadow: 0 0 14px rgba(76, 227, 255, .30);
    cursor: pointer;
  }

  .tags { display: flex; gap: 8px; margin: 8px 0 0; }
  .tag {
    height: 30px;
    display: inline-flex;
    align-items: center;
    padding: 0 13px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
  }
  .tag.c { color: #a8f1ff; border: 1px solid rgba(76, 227, 255, .5); background: rgba(76, 227, 255, .08); }
  .tag.m { color: #ffc3ee; border: 1px solid rgba(255, 79, 216, .5); background: rgba(255, 79, 216, .08); }
  .tag.y { color: #ffe9a8; border: 1px solid rgba(255, 216, 77, .5); background: rgba(255, 216, 77, .08); }

  .senses { margin-top: 8px; }
  .senses ol { list-style: none; }
  .senses li {
    display: flex;
    gap: 10px;
    font-size: 16.5px;
    line-height: 1.45;
    color: var(--ink);
  }
  .senses li .n {
    font-weight: 800;
    color: var(--magenta);
    text-shadow: 0 0 10px rgba(255, 79, 216, .5);
  }

  .compo { margin-top: 8px; }
  .compo-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .compo-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 44px;
    padding: 4px 13px;
    border-radius: 14px;
    border: 1px solid var(--line);
    background: rgba(24, 16, 52, .6);
  }
  .compo-chip .k {
    font-family: var(--jp);
    font-weight: 700;
    font-size: 22px;
    color: #e9f9ff;
    text-shadow: 0 0 10px rgba(76, 227, 255, .55);
  }
  .compo-chip .g { font-size: 13.5px; color: var(--ink-soft); }
  .compo-row .plus { color: var(--ink-mute); font-size: 18px; font-weight: 600; }

  /* --- carte mnémonique visuelle --- */
  .mnemo { margin-top: 8px; }
  .mnemo-card {
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid rgba(255, 216, 77, .35);
    background: #0e0724;
    box-shadow: 0 0 20px rgba(255, 190, 60, .12), 0 14px 34px rgba(4, 2, 16, .6);
  }
  .mnemo-card svg.scene { display: block; width: 100%; height: 100px; }
  .mnemo-band { padding: 9px 14px 10px; }
  .mnemo-band p {
    font-size: 14px;
    line-height: 1.45;
    color: #f6f2ff;
    text-wrap: pretty;
  }
  .mnemo-band p .kx { font-family: var(--jp); font-weight: 700; color: #ffd7f3; }
  .mnemo-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 7px;
  }
  .vote {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    min-height: 30px;
    padding: 0 12px;
    border-radius: 999px;
    border: 1.5px solid rgba(255, 216, 77, .6);
    background: rgba(255, 216, 77, .10);
    color: #ffe9a8;
    font-size: 13.5px;
    font-weight: 700;
    text-shadow: 0 0 8px rgba(255, 216, 77, .5);
  }
  .mnemo-meta .author { font-size: 13px; color: var(--ink-soft); }
  .mnemo-meta .author b { color: #ffe9a8; font-weight: 600; }

  .example { margin-top: 8px; }
  .segments { display: flex; flex-wrap: wrap; gap: 6px; }
  .seg {
    min-height: 44px;
    display: inline-flex;
    align-items: center;
    padding: 4px 11px;
    border-radius: 13px;
    border: 1px solid rgba(76, 227, 255, .38);
    background: rgba(76, 227, 255, .07);
    font-family: var(--jp);
    font-weight: 700;
    font-size: 18px;
    color: #eafbff;
    cursor: pointer;
  }
  .seg.hit {
    border-color: rgba(255, 79, 216, .6);
    background: rgba(255, 79, 216, .12);
    color: #ffe4f7;
    box-shadow: 0 0 12px rgba(255, 79, 216, .25);
  }
  .example .trans { margin-top: 6px; font-size: 14.5px; color: var(--ink-soft); font-style: italic; }

  .word-cta-wrap { padding: 8px 22px 14px; margin-top: auto; }
  .word-cta-wrap .cta { margin-top: 0; }

  /* ================================================================
     ÉCRAN 3 — RÉVISION
     ================================================================ */
  .review-screen { position: relative; }
  .petals {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    border-radius: 48px;
    z-index: 3;
  }
  .petal {
    position: absolute;
    width: 14px; height: 11px;
    border-radius: 70% 30% 60% 40% / 55% 60% 40% 45%;
    background: linear-gradient(140deg, #ffb1e8, #ff4fd8);
    box-shadow: 0 0 10px rgba(255, 100, 220, .8);
    opacity: .85;
    animation: fall var(--dur, 7s) linear infinite;
    animation-delay: var(--delay, 0s);
    top: -24px;
    left: var(--x, 50%);
  }
  .petal.cy {
    background: linear-gradient(140deg, #b8f4ff, #4ce3ff);
    box-shadow: 0 0 10px rgba(90, 225, 255, .8);
  }
  .petal.sm { width: 9px; height: 7px; opacity: .65; }

  .quiz-top {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 22px 6px;
  }
  .quiz-top .count { font-size: 14.5px; font-weight: 700; color: var(--ink); white-space: nowrap; }
  .quiz-top .count span { color: var(--ink-mute); font-weight: 500; }
  .progress {
    flex: 1;
    height: 8px;
    border-radius: 99px;
    background: rgba(150, 130, 255, .16);
    overflow: hidden;
  }
  .progress i {
    display: block;
    width: 35%;
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, #b23fff, var(--magenta));
    box-shadow: 0 0 12px rgba(255, 79, 216, .8);
  }

  .flash-wrap {
    position: relative;
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 8px 22px;
  }
  .burst {
    position: absolute;
    width: 360px; height: 360px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 79, 216, .26) 0%, rgba(255, 79, 216, .09) 42%, transparent 68%);
    animation: burst 2.8s ease-out infinite;
  }
  .streak-chip {
    position: relative;
    z-index: 1;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    min-height: 34px;
    padding: 0 14px;
    border-radius: 999px;
    border: 1.5px solid rgba(93, 255, 157, .55);
    background: rgba(20, 34, 28, .8);
    color: #c8ffe0;
    font-size: 13.5px;
    font-weight: 700;
    text-shadow: 0 0 10px rgba(93, 255, 157, .55);
    box-shadow: 0 0 14px rgba(93, 255, 157, .18);
  }
  .flashcard {
    position: relative;
    z-index: 1;
    width: 100%;
    border-radius: 26px;
    border: 2px solid rgba(255, 110, 220, .55);
    background: linear-gradient(180deg, #1d0f3a, #130827);
    box-shadow:
      0 0 20px rgba(255, 79, 216, .30),
      0 0 70px rgba(255, 79, 216, .12),
      inset 0 0 30px rgba(255, 79, 216, .08);
    padding: 36px 22px 28px;
    text-align: center;
  }
  .deck-line {
    text-align: center;
    font-size: 13.5px;
    font-weight: 500;
    color: var(--ink-mute);
    padding: 2px 22px 0;
  }
  .flashcard .prompt {
    font-family: var(--jp);
    font-weight: 900;
    font-size: 96px;
    line-height: 1.15;
    color: #fff2fb;
    text-shadow:
      0 0 6px rgba(255, 130, 225, .95),
      0 0 22px rgba(255, 79, 216, .7),
      0 0 52px rgba(255, 79, 216, .4);
  }
  .flashcard .rule {
    width: 64%;
    height: 1px;
    margin: 20px auto 16px;
    background: linear-gradient(90deg, transparent, rgba(255, 130, 225, .65), transparent);
    box-shadow: 0 0 10px rgba(255, 79, 216, .5);
  }
  .flashcard .reading {
    font-family: var(--jp);
    font-weight: 700;
    font-size: 26px;
    color: #aef2ff;
    text-shadow: 0 0 14px rgba(76, 227, 255, .6);
  }
  .flashcard .meaning { margin-top: 6px; font-size: 19px; font-weight: 500; color: var(--ink); }

  .grades {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 9px;
    padding: 4px 18px 22px;
  }
  .grade {
    min-height: 76px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    border-radius: 18px;
    background: rgba(14, 9, 34, .7);
    cursor: pointer;
    font-family: var(--lat);
  }
  .grade svg { display: block; margin-bottom: 1px; }
  .grade .lbl { font-size: 12.5px; font-weight: 700; letter-spacing: .01em; }
  .grade .ivl { font-size: 10.5px; font-weight: 500; color: var(--ink-mute); }
  .grade.again {
    border: 1.5px solid rgba(255, 84, 112, .65);
    color: #ffb9c6;
    box-shadow: 0 0 12px rgba(255, 84, 112, .22), inset 0 0 12px rgba(255, 84, 112, .08);
  }
  .grade.again .lbl { color: #ffc7d1; text-shadow: 0 0 10px rgba(255, 84, 112, .6); }
  .grade.hard {
    border: 1.5px solid rgba(255, 176, 58, .65);
    color: #ffd9a1;
    box-shadow: 0 0 12px rgba(255, 176, 58, .22), inset 0 0 12px rgba(255, 176, 58, .08);
  }
  .grade.hard .lbl { color: #ffe0b3; text-shadow: 0 0 10px rgba(255, 176, 58, .6); }
  .grade.good {
    border: 1.5px solid rgba(93, 255, 157, .7);
    color: #bdffd8;
    background: rgba(93, 255, 157, .10);
    box-shadow: 0 0 18px rgba(93, 255, 157, .35), inset 0 0 14px rgba(93, 255, 157, .12);
  }
  .grade.good .lbl { color: #d9ffe9; text-shadow: 0 0 10px rgba(93, 255, 157, .7); }
  .grade.easy {
    border: 1.5px solid rgba(76, 227, 255, .65);
    color: #b5f0ff;
    box-shadow: 0 0 12px rgba(76, 227, 255, .22), inset 0 0 12px rgba(76, 227, 255, .08);
  }
  .grade.easy .lbl { color: #ccf5ff; text-shadow: 0 0 10px rgba(76, 227, 255, .6); }

  /* ---------- animations ---------- */
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    41.5% { opacity: 1; }
    42% { opacity: .86; }
    42.6% { opacity: 1; }
    43.1% { opacity: .93; }
    43.6% { opacity: 1; }
    78% { opacity: 1; }
    78.4% { opacity: .9; }
    79% { opacity: 1; }
  }
  @keyframes breathe {
    0%, 100% { box-shadow: 0 0 22px rgba(255, 79, 216, .45), 0 6px 18px rgba(255, 79, 216, .25); }
    50% { box-shadow: 0 0 34px rgba(255, 79, 216, .6), 0 6px 22px rgba(255, 79, 216, .32); }
  }
  @keyframes fall {
    0% { transform: translate(0, -30px) rotate(0deg); }
    25% { transform: translate(18px, 210px) rotate(80deg); }
    50% { transform: translate(-10px, 430px) rotate(160deg); }
    75% { transform: translate(16px, 640px) rotate(240deg); }
    100% { transform: translate(-6px, 880px) rotate(320deg); }
  }
  @keyframes burst {
    0% { transform: scale(.82); opacity: .55; }
    70% { transform: scale(1.12); opacity: .95; }
    100% { transform: scale(.82); opacity: .55; }
  }

  @media (prefers-reduced-motion: reduce) {
    .direction h1, .vitrine .hero { animation: none; }
    .cta { animation: none; }
    .burst { animation: none; opacity: .5; }
    .petal { animation: none; opacity: 0; }
    .petal:nth-child(-n+5) { opacity: .45; top: auto; }
    .petal:nth-child(1) { top: 14%; }
    .petal:nth-child(2) { top: 30%; }
    .petal:nth-child(3) { top: 48%; }
    .petal:nth-child(4) { top: 22%; }
    .petal:nth-child(5) { top: 60%; }
  }
</style>
