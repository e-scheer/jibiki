name: Release Web

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: web-production-${{ github.sha }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  JIBIKI_RELEASE: jibiki-web@${{ github.sha }}

jobs:
  build-and-publish:
    name: Build, symbolicate and publish
    runs-on: ubuntu-24.04
    environment: production
    timeout-minutes: 45
    env:
      PUBLIC_SITE_URL: https://jibiki.app
      PUBLIC_APP_URL: https://my.jibiki.app
      PUBLIC_API_URL: https://api.jibiki.app
      JIBIKI_API_BASE: https://api.jibiki.app
      JIBIKI_ENVIRONMENT: production
      PUBLIC_GA_MEASUREMENT_ID: ${{ vars.MARKETING_GA_MEASUREMENT_ID }}
      PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ vars.GOOGLE_SITE_VERIFICATION }}
      FIREBASE_API_KEY: ${{ vars.FIREBASE_API_KEY }}
      FIREBASE_APP_ID: ${{ vars.FIREBASE_WEB_APP_ID }}
      FIREBASE_MESSAGING_SENDER_ID: ${{ vars.FIREBASE_MESSAGING_SENDER_ID }}
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
      FIREBASE_AUTH_DOMAIN: ${{ vars.FIREBASE_AUTH_DOMAIN }}
      FIREBASE_STORAGE_BUCKET: ${{ vars.FIREBASE_STORAGE_BUCKET }}
      FIREBASE_MEASUREMENT_ID: ${{ vars.FIREBASE_WEB_MEASUREMENT_ID }}
      FLUTTER_SENTRY_DSN: ${{ vars.FLUTTER_SENTRY_DSN }}

    steps:
      - name: Check out the exact revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate production configuration
        shell: bash
        run: |
          set -euo pipefail
          required=(
            PUBLIC_GA_MEASUREMENT_ID
            PUBLIC_GOOGLE_SITE_VERIFICATION
            FIREBASE_API_KEY
            FIREBASE_APP_ID
            FIREBASE_MESSAGING_SENDER_ID
            FIREBASE_PROJECT_ID
            FIREBASE_AUTH_DOMAIN
            FIREBASE_STORAGE_BUCKET
            FIREBASE_MEASUREMENT_ID
            FLUTTER_SENTRY_DSN
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing production configuration: ${name}"
              exit 1
            fi
          done

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.23.1
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Build the Astro marketing site
        working-directory: site
        run: |
          npm ci
          npm run build
          npm run test:seo

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: "3.44.5"
          channel: stable
          cache: true

      - name: Verify Flutter
        working-directory: app
        shell: bash
        run: |
          set -euo pipefail
          flutter pub get --enforce-lockfile
          flutter analyze
          flutter test

      - name: Build Flutter Web with private source maps
        working-directory: app
        shell: bash
        run: |
          set -euo pipefail
          flutter build web --release --source-maps \
            --dart-define="JIBIKI_API_BASE=${JIBIKI_API_BASE}" \
            --dart-define="JIBIKI_ENVIRONMENT=${JIBIKI_ENVIRONMENT}" \
            --dart-define="JIBIKI_RELEASE=${JIBIKI_RELEASE}" \
            --dart-define="FIREBASE_API_KEY=${FIREBASE_API_KEY}" \
            --dart-define="FIREBASE_APP_ID=${FIREBASE_APP_ID}" \
            --dart-define="FIREBASE_MESSAGING_SENDER_ID=${FIREBASE_MESSAGING_SENDER_ID}" \
            --dart-define="FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}" \
            --dart-define="FIREBASE_AUTH_DOMAIN=${FIREBASE_AUTH_DOMAIN}" \
            --dart-define="FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET}" \
            --dart-define="FIREBASE_MEASUREMENT_ID=${FIREBASE_MEASUREMENT_ID}" \
            --dart-define="SENTRY_DSN=${FLUTTER_SENTRY_DSN}"
          test -s build/web/main.dart.js
          test -s build/web/main.dart.js.map

      - name: Inject Debug IDs and upload Flutter maps to Sentry
        uses: getsentry/action-release@ff07929a6537bac57790c3451cf4d364aca38528 # v3.7.0
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          release: ${{ env.JIBIKI_RELEASE }}
          sourcemaps: app/build/web/main.dart.js app/build/web/main.dart.js.map
          inject: true
          finalize: true
          set_commits: auto
          ignore_missing: true
          ignore_empty: true
          strip_common_prefix: true
          url_prefix: "~/"
          disable_telemetry: true

      - name: Assemble the source-map-free runtime
        run: >-
          node scripts/assemble_web_release.mjs
          --release "${JIBIKI_RELEASE}"
          --revision "${GITHUB_SHA}"
          --site site/dist
          --app app/build/web
          --output web-runtime

      - name: Validate the packaged Caddy configuration
        run: >-
          docker run --rm
          -e ROOT_DOMAIN=jibiki.app
          -e APP_DOMAIN=my.jibiki.app
          -e API_DOMAIN=api.jibiki.app
          -e JIBIKI_RELEASE="${JIBIKI_RELEASE}"
          -v "$PWD/web-runtime/Caddyfile:/etc/caddy/Caddyfile:ro"
          caddy:2.10.2-alpine@sha256:4c6e91c6ed0e2fa03efd5b44747b625fec79bc9cd06ac5235a779726618e530d
          caddy validate --config /etc/caddy/Caddyfile

      - name: Upload the deployable runtime
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jibiki-web-${{ github.sha }}
          path: web-runtime/
          if-no-files-found: error
          retention-days: 14

      - name: Resolve the GHCR image name
        id: registry
        shell: bash
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Authenticate to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate immutable image metadata
        id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ steps.registry.outputs.image }}
          tags: |
            type=sha,format=long
            type=ref,event=tag
          labels: |
            org.opencontainers.image.version=${{ env.JIBIKI_RELEASE }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Publish the exact runtime image
        id: publish
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: web-runtime
          file: web-runtime/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            JIBIKI_RELEASE=${{ env.JIBIKI_RELEASE }}
            OCI_REVISION=${{ github.sha }}
            OCI_SOURCE=${{ github.server_url }}/${{ github.repository }}

      - name: Attest the published image
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-name: ${{ steps.registry.outputs.image }}
          subject-digest: ${{ steps.publish.outputs.digest }}
          push-to-registry: true

      - name: Write release summary
        shell: bash
        run: |
          {
            echo "## Web release"
            echo
            echo "- Release: \`${JIBIKI_RELEASE}\`"
            echo "- Image: \`${{ steps.registry.outputs.image }}@${{ steps.publish.outputs.digest }}\`"
            echo "- Hosts: \`jibiki.app\`, \`my.jibiki.app\`, \`api.jibiki.app\`"
            echo "- Flutter source maps: uploaded to Sentry, absent from the runtime"
          } >> "$GITHUB_STEP_SUMMARY"
